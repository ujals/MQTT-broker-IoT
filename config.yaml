# ─────────────────────────────────────────────────────────────────────────────
# Pure-Python MQTT Broker  –  config.yaml
# Run with:  python -m mqtt_broker --config config.yaml
# ─────────────────────────────────────────────────────────────────────────────


# ── TCP listeners ─────────────────────────────────────────────────────────────
listeners:
  - host: 0.0.0.0
    port: 1883          # plain MQTT (3.1 / 3.1.1 / 5.0)

  # Uncomment for TLS on port 8883:
  # - host: 0.0.0.0
  #   port: 8883
  #   tls:
  #     certfile: certs/server.crt
  #     keyfile:  certs/server.key
  #     ca_certs: certs/ca.crt      # optional: require client certs


# ── Authentication ────────────────────────────────────────────────────────────
auth:
  enabled: false            # set true to enforce credentials
  allow_anonymous: true     # allow clients with no username

  # Users: plain-text passwords or "sha256:<hex-digest>"
  users:
    alice: "secret123"
    bob:   "hunter2"
    # gateway1: "sha256:e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855"


# ── External forwarders ───────────────────────────────────────────────────────
# Any message received by the broker is also forwarded here.
# All are optional — comment out the ones you don't need.
forwarders:

  # ── HTTP / HTTPS  ─────────────────────────────────────────────────────────
  # - name: my_rest_api
  #   type: http
  #   url: http://192.168.1.100:8080/api/lora/ingest
  #   # url: https://platform.example.com/v1/data/{topic}   # {topic} = MQTT topic
  #   method: POST
  #   timeout: 10
  #   ssl_verify: true
  #   headers:
  #     Content-Type: application/json
  #     Authorization: Bearer YOUR_TOKEN

  # ── MQTT (bridge to cloud / another broker) ───────────────────────────────
  # - name: cloud_bridge
  #   type: mqtt
  #   host: broker.example.com
  #   port: 1883
  #   client_id: my_broker_bridge
  #   # username: cloud_user
  #   # password: cloud_pass
  #   qos: 1
  #   retain: false
  #   topic_prefix: "lns/"   # "dev/01" → "lns/dev/01"
  #   # topic: "all/data"    # fixed output topic (ignores incoming topic)

  # ── UDP ──────────────────────────────────────────────────────────────────
  # - name: local_udp
  #   type: udp
  #   host: 127.0.0.1
  #   port: 5005


# ── Resource limits ───────────────────────────────────────────────────────────
limits:
  max_connections: 10000    # maximum simultaneous TCP connections
  max_packet_size: 1048576  # 1 MB — reject packets larger than this
  forwarder_threads: 10     # thread pool size for blocking forwarders (HTTP/UDP)


# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level: INFO               # DEBUG | INFO | WARNING | ERROR
  file: mqtt_broker.log     # comment out to log to stdout only
  max_bytes: 10485760       # 10 MB
  backup_count: 5
